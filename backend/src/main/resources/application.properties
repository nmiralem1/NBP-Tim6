spring.application.name=nbp_tim6

spring.datasource.url=jdbc:oracle:thin:@ora-02.db.lab.etf.unsa.ba:1521/ETFDB
spring.datasource.username=NBPT6
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.enabled=true

spring.sql.init.mode=always

nbp.jwt.secret=${JWT_SECRET}
nbp.jwt.expirationMs=3600000
nbp.jwt.refreshExpirationMs=604800000
logging.level.org.springframework.security=DEBUG

stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL}
sendgrid.from.name=${SENDGRID_FROM_NAME}