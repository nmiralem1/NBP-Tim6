<nav class="top-nav">
    <div class="logo" routerLink="/">
        <span class="globe">🌍</span> TravelPlanner
    </div>

    <div class="nav-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/destinations" routerLinkActive="active">Destinations</a>
        <a routerLink="/trips" routerLinkActive="active">Trips</a>
        <a routerLink="/accommodations" routerLinkActive="active">Accommodations</a>
        <a routerLink="/activities" routerLinkActive="active">Activities</a>
        <a routerLink="/transportation" routerLinkActive="active">Transportation</a>
        <a *ngIf="authService.isLoggedIn()" routerLink="/bookings" routerLinkActive="active">My Bookings</a>
    </div>

    <div class="nav-actions">
        <div class="user-container" *ngIf="authService.isLoggedIn(); else loginBtn">
            <div class="user-profile" (click)="toggleMenu()">👤</div>

            <div class="dropdown-menu" [class.show]="isMenuOpen">
                <a routerLink="/profile" (click)="closeMenu()">My Profile</a>
                <a routerLink="/trips" (click)="closeMenu()">My Trips</a>
                <hr />
                <button (click)="logout()" class="btn-logout" type="button">Logout</button>
            </div>
        </div>

        <ng-template #loginBtn>
            <a routerLink="/login" class="btn-login">Log In</a>
        </ng-template>
    </div>
</nav>
