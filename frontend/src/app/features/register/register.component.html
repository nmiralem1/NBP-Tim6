<div class="register-container">
  <!-- Left side - decorative section with trip theme -->
  <div class="register-decoration">
    <div class="decoration-content">
      <h1>Join Our Community</h1>
      <p>Start planning your adventures today</p>
      <div class="decoration-icons">
        <span class="icon">✈️</span>
        <span class="icon">🏖️</span>
        <span class="icon">🏔️</span>
        <span class="icon">🗺️</span>
      </div>
    </div>
  </div>

  <!-- Right side - registration form -->
  <div class="register-form-container">
    <div class="form-wrapper">
      <div class="form-header">
        <h2>Create Account</h2>
        <p>Join us and start exploring</p>
        <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>
        <p *ngIf="successMessage" class="success-message">{{ successMessage }}</p>
      </div>

      <form class="register-form" (submit)="onSubmit()">
        <!-- First Name input -->
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="firstName" name="firstName" placeholder="Enter first name"
                [(ngModel)]="registerData.firstName" required />
            </div>
          </div>

          <!-- Last Name input -->
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="lastName" name="lastName" placeholder="Enter last name"
                [(ngModel)]="registerData.lastName" required />
            </div>
          </div>
        </div>

        <!-- Email input -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="email" name="email" placeholder="Enter your email" [(ngModel)]="registerData.email"
              required />
          </div>
        </div>

        <!-- Phone input -->
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <div class="input-wrapper">
            <span class="input-icon">📱</span>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number"
              [(ngModel)]="registerData.phone" required />
          </div>
        </div>

        <!-- Username input -->
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="username" name="username" placeholder="Enter your username"
              [(ngModel)]="registerData.username" required />
          </div>
        </div>

        <!-- Password input -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="Create a strong password"
              [(ngModel)]="registerData.passwordHash" required />
          </div>
        </div>

        <!-- Terms and conditions -->
        <div class="form-options">
          <label class="terms-checkbox">
            <input type="checkbox" />
            <span>I agree to the <a href="#">Terms & Conditions</a></span>
          </label>
        </div>

        <!-- Register button -->
        <button type="submit" class="btn-register">Create Account</button>
      </form>

      <!-- Login link -->
      <div class="login-link">
        <p>Already have an account? <a href="/login">Sign in</a></p>
      </div>
    </div>
  </div>
</div>
