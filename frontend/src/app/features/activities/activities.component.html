<div class="activities-page">
  <div class="content-layout">

    <aside class="filters-sidebar">
      <div class="filters-card">
        <h2>Search</h2>

        <div class="filter-group">
          <label for="search">Search activity</label>
          <input
            id="search"
            type="text"
            placeholder="Search activity..."
            [(ngModel)]="searchTerm"
            (input)="filterActivities()"
          />
        </div>

        <div class="filter-group">
          <label for="activityDate">Date</label>
          <input
            id="activityDate"
            type="date"
            [(ngModel)]="selectedDate"
            (change)="filterActivities()"
          />
        </div>

        <div class="filter-group">
          <label for="price">Maximum price</label>
          <input
            id="price"
            type="number"
            placeholder="Enter max price"
            [(ngModel)]="maxPrice"
            (input)="filterActivities()"
          />
        </div>

        <button class="primary-btn" type="button" (click)="filterActivities()">
          Show activities
        </button>

        <button class="secondary-btn" type="button" (click)="resetFilters()">
          Reset filters
        </button>
      </div>
    </aside>

    <main class="activities-content">
      <div class="section-header">
        <h1>Activities</h1>
      </div>

      <p *ngIf="isLoading" class="empty-state">Loading activities...</p>

      <div class="activities-grid" *ngIf="!isLoading">
        <div
          *ngFor="let item of filteredActivities"
          class="activity-card"
          (click)="openActivityDetails(item.id)"
        >
          <div class="image-wrapper">
            <img
              [src]="item.imageUrl || 'assets/images/placeholder.jpg'"
              [alt]="item.name"
            />
          </div>

          <div class="card-content">
            <h3>{{ item.name }}</h3>
            <p class="location">{{ item.location }}</p>
            <p class="price">{{ item.price }} KM / person</p>
            <p class="availability" *ngIf="item.activityDate">Date: {{ item.activityDate }}</p>
          </div>
        </div>
      </div>

      <p class="empty-state" *ngIf="!isLoading && filteredActivities.length === 0">
        No activities found.
      </p>
    </main>

  </div>
</div>
