<div class="destinations-page">
    <div class="content-layout">

        <aside class="filters-sidebar">
            <div class="filters-card">
                <h2>Pretraga</h2>

                <div class="filter-group">
                    <label for="search">Pretraži destinacije</label>
                    <input
                        id="search"
                        type="text"
                        placeholder="Pretraži destinacije..."
                        [(ngModel)]="searchTerm"
                        (input)="filterDestinations()"
                    />
                </div>

                <div class="filter-group">
                    <label for="type">Država</label>
                    <select
                        id="type"
                        [(ngModel)]="selectedCountry"
                        (change)="filterDestinations()"
                    >
                        <option value="">Sve države</option>
                        <option *ngFor="let country of countries" [value]="country">
                            {{ country }}
                        </option>
                    </select>
                </div>

                <button class="primary-btn" type="button" (click)="filterDestinations()">
                    Prikaži destinacije
                </button>

                <button class="secondary-btn" type="button" (click)="resetFilters()">
                    Resetuj filtere
                </button>
            </div>
        </aside>

        <main class="destinations-content">
            <div class="section-header">
                <h1>Popularne Destinacije</h1>
            </div>

            <div class="destinations-grid">
                <div *ngFor="let city of filteredDestinations" class="destination-card">
                    <div class="image-wrapper">
                        <img
                            [src]="city.imageUrl || 'assets/images/placeholder.jpg'"
                            [alt]="city.name"
                        />
                    </div>

                    <div class="card-content">
                        <h3>{{ city.name }}</h3>
                        <p class="country">{{ city.countryName }}</p>
                        <p class="continent">{{ city.continent }}</p>
                    </div>

                    <a [routerLink]="['/destinations', city.id]" class="card-link"></a>
                </div>
            </div>
        </main>

    </div>
</div>
